<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Primary Meta Tags -->
    <meta name="description" content="Create stunning custom QR codes instantly with Devu QR Code Generator. Customize colors, add logos, and share with ease. Built by Divyanshu Thakur.">
    <meta name="author" content="Divyanshu Thakur">
    <meta name="theme-color" content="#0f172a">
    
    <title>Devu QR Code Generator</title>
    
    <!-- QR Code Styling Library (Lightweight & Pro) -->
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Favicon (Optional inline SVG for speed) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <div class="app-container">
        <!-- Header Section -->
        <header class="app-header">
            <div class="logo-wrapper">
                <span class="logo-icon">⚡</span>
                <h1>Devu <span class="highlight">QR</span></h1>
            </div>
            <p class="tagline">Generate. Customize. Share. Instantly.</p>
        </header>

        <!-- Main Grid: Controls | Preview -->
        <main class="main-grid">
            <!-- Left Panel: Controls -->
            <section class="controls-panel glass-card">
                <h2>Configuration</h2>
                
                <div class="input-group">
                    <label for="urlInput">Target URL</label>
                    <input type="url" id="urlInput" placeholder="https://github.com/Devu77" value="https://github.com/Devu77">
                </div>

                <div class="input-group">
                    <label for="titleInput">QR Title</label>
                    <input type="text" id="titleInput" placeholder="My Awesome QR" value="Devu's GitHub">
                </div>

                <div class="input-group color-row">
                    <div class="color-wrapper">
                        <label for="colorPicker">Dots Color</label>
                        <input type="color" id="colorPicker" value="#3b82f6">
                    </div>
                    <div class="color-wrapper">
                        <label for="bgPicker">Background</label>
                        <input type="color" id="bgPicker" value="#ffffff">
                    </div>
                </div>

                <div class="input-group">
                    <label for="logoUpload">Brand Logo (Center)</label>
                    <div class="file-upload-wrapper">
                        <input type="file" id="logoUpload" accept="image/*">
                        <span class="file-placeholder">Choose an image...</span>
                    </div>
                </div>

                <button id="generateBtn" class="btn-primary">
                    <span class="btn-icon">✦</span> Generate QR Code
                </button>
            </section>

            <!-- Right Panel: Preview & Actions -->
            <section class="preview-panel glass-card">
                <h2>Preview</h2>
                
                <!-- QR Display Area -->
                <div class="qr-display" id="qrDisplay">
                    <div id="qrTitle" class="qr-title">Devu's GitHub</div>
                    <div id="qrCodeContainer" class="qr-code-wrapper"></div>
                </div>

                <!-- Action Buttons -->
                <div class="action-grid">
                    <button id="downloadBtn" class="btn-action" title="Download PNG">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Download
                    </button>
                    <button id="copyBtn" class="btn-action" title="Copy to Clipboard">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        Copy
                    </button>
                    <button id="shareBtn" class="btn-action" title="Share">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                        Share
                    </button>
                </div>
            </section>
        </main>

        <!-- Footer with GitHub -->
        <footer class="app-footer">
            <p>
                Built with <span class="heart">❤</span> by 
                <a href="https://github.com/Devu77" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                    Divyanshu Thakur
                </a>
                <span class="divider">|</span> 
                <span class="version">v1.0.0</span>
            </p>
        </footer>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
